version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    groups:
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"
    schedule:
      interval: weekly
  - package-ecosystem: gomod
    directory: /deploy
    groups:
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    groups:
      actions:
        patterns:
          - "*"
    schedule:
      interval: weekly
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
        interval: "weekly"
